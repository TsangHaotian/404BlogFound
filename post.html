<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">文章 - 404 Blog Not Found</title>
  <meta name="description" content="">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo">404 Blog Not Found</a>
      <nav class="main-nav">
        <a href="index.html">首页</a>
        <a href="posts.html">归档</a>
        <a href="projects.html">作品集</a>
        <a href="about.html">关于</a>
      </nav>
      <button class="menu-toggle" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main class="container main-content">
    <article class="post-full" id="post-content">
      <p class="empty">加载中...</p>
    </article>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; TsangHaotian | Powered by GitHub Pages</p>
    </div>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script>
    // 配置 marked 支持 highlight.js
    marked.setOptions({
      highlight: function (code, lang) {
        if (lang && hljs.getLanguage(lang)) {
          try { return hljs.highlight(code, { language: lang }).value; } catch (e) {}
        }
        try { return hljs.highlightAuto(code).value; } catch (e) {}
        return code;
      }
    });

    // 从 URL 获取文章 ID
    const params = new URLSearchParams(window.location.search);
    const postId = params.get('id');

    if (!postId) {
      document.getElementById('post-content').innerHTML = '<p class="empty">未指定文章 ID</p>';
    } else {
      fetchPost(postId).then(post => {
        document.getElementById('page-title').textContent = post.title + ' - 404 Blog Not Found';

        // 渲染文章
        document.getElementById('post-content').innerHTML = `
          <p style="margin-bottom:16px"><a href="index.html" style="color:var(--text-secondary);text-decoration:none;font-size:0.9rem">&larr; 返回首页</a> <a href="posts.html" style="color:var(--text-secondary);text-decoration:none;font-size:0.9rem;margin-left:16px">&larr; 返回归档</a></p>
          <header class="post-header">
            <h1>${post.title}</h1>
            <div class="post-meta">
              <time>${post.date}</time>
              ${post.tags.length ? `<span class="tags">${post.tags.map(t => `<span class="tag">${t}</span>`).join('')}</span>` : ''}
            </div>
          </header>
          <div class="post-content">${marked.parse(post.body)}</div>
        `;
      }).catch(err => {
        document.getElementById('post-content').innerHTML = '<p class="empty">加载失败，请刷新重试</p>';
      });
    }
  </script>
</body>
</html>
