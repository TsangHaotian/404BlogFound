<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作品集 - 404 Blog Not Found</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo">404 Blog Not Found</a>
      <nav class="main-nav">
        <a href="index.html">首页</a>
        <a href="posts.html">归档</a>
        <a href="projects.html">作品集</a>
        <a href="about.html">关于</a>
      </nav>
      <button class="menu-toggle" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main class="container main-content">
    <section class="projects-page">
      <h1>作品集</h1>
      <p class="subtitle">我的 GitHub 开源项目</p>
      <div id="project-groups"><p class="empty">加载中...</p></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; TsangHaotian | Powered by GitHub Pages</p>
    </div>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script>
    // 精选配置：每个分类的精选项目，以及跳转链接
    // 有独立详情页的填 page 路径，没有的默认跳 GitHub
    const FEATURED = {
      'AI大模型微调': [
        { name: 'Su-Shi-dingfengbo-poems-fine-tuning-AI-model' }
      ],
      'Harmony': [
        { name: 'Harmony_EyesNote' }
      ],
      'Android': [],
      'HTML': [
        { name: 'RocoKingdomTranslator', page: 'featured/HTML/RocoKingdomTranslator/', thumb: 'featured/HTML/RocoKingdomTranslator/主界面截图.jpeg' },
        { name: 'GaokaoHelper' },
        { name: 'Web_Xinjiang_Foods' },
        { name: 'DrawAnythingToYakiji' }
      ],
      'Python': [
        { name: 'openclaw-css-tweaker' },
        { name: 'python_40_Parallel_College_Volunteering_for_C' },
        { name: 'Python_Probability_theory_gambling_game' },
        { name: 'Python_mind_project' }
      ],
      '微信小程序': [
        { name: 'WChatXiaoChengxu_jizhangben' }
      ],
      '竞赛': [],
      '其他': []
    };

    fetchRepos().then(projects => {
      const container = document.getElementById('project-groups');
      if (!projects.length) {
        container.innerHTML = '<p class="empty">暂无 GitHub 项目展示。</p>';
        return;
      }

      const langMap = {'404BlogFound':'HTML','CardGameYS':'其他','Harmony_EyesNote':'Harmony','GaokaoHelper':'HTML','openclaw-css-tweaker':'Python','JRXY-AutoSign-Reborn':'Python','Software_Libraries':'其他','RocoKingdomTranslator':'HTML','Python_Visual_Focus_Training_System':'Python','DrawAnythingToYakiji':'HTML','YajijiOracle':'HTML','4C_competition':'竞赛','web_happybirthday':'HTML','Android_login':'Android','python_word_to_excel':'Python','python_Job_Check_tool':'Python','python_pdf_to_word':'Python','Android_login_and_jigsaw_puzzle':'Android','Android_Calculators':'Android','python_Excel_merge_tool':'Python','Android_Mental_health_program':'Android','Python_Probability_theory_gambling_game':'Python','Python_Interactive_somatosensory_operation':'Python','Su-Shi-dingfengbo-poems-fine-tuning-AI-model':'AI大模型微调','python_ppt_assistant':'Python','Python_data_merge_tool':'Python','Python_Probability_theory_gambling_game_V2.0':'Python','python_40_Parallel_College_Volunteering_for_C':'Python','Web_Truth_or_dare':'HTML','Web_Find_a_difference':'HTML','Web_Person':'HTML','Web_Xinjiang_Foods':'HTML','Python_mind_project':'Python','WChatXiaochengxuYun_jizhangben':'微信小程序','WChatXiaoChengxu_jizhangben':'微信小程序','Organizing_the_computer_desktop':'Python','python_web_Question_Bank_Assistant':'Python','Python_hand_language_web':'Python'};
      const groups = {};
      projects.forEach(p => {
        p.language = langMap[p.name] || p.language || '其他';
        const lang = p.language || '其他';
        if (!groups[lang]) groups[lang] = [];
        groups[lang].push(p);
      });

      const langOrder = ['AI大模型微调','Harmony','Android','HTML','Python','微信小程序','竞赛','其他'];
      const sortedLangs = Object.keys(groups).sort((a, b) => {
        const ai = langOrder.indexOf(a), bi = langOrder.indexOf(b);
        return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
      });

      let activeTab = (new URLSearchParams(window.location.search)).get('tab');
      if (!activeTab || !sortedLangs.includes(activeTab)) activeTab = sortedLangs[0];
      container.innerHTML = `
        <div class="project-tabs">${sortedLangs.map(l => `<button class="tab-btn${l === activeTab ? ' active' : ''}" data-tab="${l}">${l} (${groups[l].length})</button>`).join('')}</div>
        <div class="tab-content">${sortedLangs.map(l => `
          <div class="tab-panel${l === activeTab ? ' active' : ''}" data-panel="${l}">
            ${FEATURED[l] && FEATURED[l].length ? `
            <div class="featured-section">
              <h3 class="featured-title">精选</h3>
              <div class="featured-grid">${FEATURED[l].map(f => {
                const proj = groups[l].find(p => p.name === f.name);
                if (!proj) return '';
                const link = f.page || proj.url;
                const isInternal = f.page ? true : false;
                return `
                  <a href="${link}" class="featured-card" ${isInternal ? '' : 'target="_blank" rel="noopener"'}>
                    ${f.thumb ? `<div class="featured-thumb"><img src="${f.thumb}" alt="${f.name}" onerror="this.parentElement.style.display='none'"></div>` : ''}
                    <div class="featured-info">
                      <h4>${f.name}</h4>
                      <p>${proj.description || ''}</p>
                      <div class="project-meta">
                        <span class="lang">${proj.language}</span>
                        <span class="stars">★ ${proj.stars}</span>
                      </div>
                    </div>
                  </a>
                `;
              }).join('')}</div>
            </div>` : ''}
            <div class="all-projects-section">
              <h3 class="featured-title">全部项目 <span class="count">(${groups[l].length})</span></h3>
              <div class="project-grid">${groups[l].map(p => `
                <a href="${p.url}" class="project-card" target="_blank" rel="noopener">
                  <h3>${p.name}</h3>
                  <p>${p.description}</p>
                  <div class="project-meta">
                    ${p.language ? `<span class="lang">${p.language}</span>` : ''}
                    <span class="stars">★ ${p.stars}</span>
                  </div>
                </a>
              `).join('')}</div>
            </div>
          </div>
        `).join('')}</div>`;

      container.addEventListener('click', e => {
        const btn = e.target.closest('.tab-btn');
        if (!btn) return;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        const panel = document.querySelector(`.tab-panel[data-panel="${btn.dataset.tab}"]`);
        if (panel) panel.classList.add('active');
      });
    }).catch(() => {
      document.getElementById('project-groups').innerHTML = '<p class="empty">加载失败，请刷新重试</p>';
    });
  </script>
</body>
</html>
