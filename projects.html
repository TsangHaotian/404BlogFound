<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作品集 - 404 Blog Not Found</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo">404 Blog Not Found</a>
      <nav class="main-nav">
        <a href="index.html">首页</a>
        <a href="posts.html">归档</a>
        <a href="projects.html">作品集</a>
        <a href="about.html">关于</a>
      </nav>
      <button class="menu-toggle" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main class="container main-content">
    <section class="projects-page">
      <h1>作品集</h1>
      <p class="subtitle">我的 GitHub 开源项目</p>
      <div id="project-groups"><p class="empty">加载中...</p></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; TsangHaotian | Powered by GitHub Pages</p>
    </div>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script>
    fetchRepos().then(projects => {
      const container = document.getElementById('project-groups');
      if (!projects.length) {
        container.innerHTML = '<p class="empty">暂无 GitHub 项目展示。</p>';
        return;
      }

      const langMap = {'404BlogFound':'HTML','CardGameYS':'其他','Harmony_EyesNote':'Harmony','GaokaoHelper':'HTML','openclaw-css-tweaker':'Python','JRXY-AutoSign-Reborn':'Python','Software_Libraries':'其他','RocoKingdomTranslator':'HTML','Python_Visual_Focus_Training_System':'Python','DrawAnythingToYakiji':'HTML','YajijiOracle':'HTML','4C_competition':'竞赛','web_happybirthday':'HTML','Android_login':'Android','python_word_to_excel':'Python','python_Job_Check_tool':'Python','python_pdf_to_word':'Python','Android_login_and_jigsaw_puzzle':'Android','Android_Calculators':'Android','python_Excel_merge_tool':'Python','Android_Mental_health_program':'Android','Python_Probability_theory_gambling_game':'Python','Python_Interactive_somatosensory_operation':'Python','Su-Shi-dingfengbo-poems-fine-tuning-AI-model':'AI大模型微调','python_ppt_assistant':'Python','Python_data_merge_tool':'Python','Python_Probability_theory_gambling_game_V2.0':'Python','python_40_Parallel_College_Volunteering_for_C':'Python','Web_Truth_or_dare':'HTML','Web_Find_a_difference':'HTML','Web_Person':'HTML','Web_Xinjiang_Foods':'HTML','Python_mind_project':'Python','WChatXiaochengxuYun_jizhangben':'微信小程序','WChatXiaoChengxu_jizhangben':'微信小程序','Organizing_the_computer_desktop':'Python','python_web_Question_Bank_Assistant':'Python','Python_hand_language_web':'Python'};
      const groups = {};
      projects.forEach(p => {
        p.language = langMap[p.name] || p.language || '其他';
        const lang = p.language || '其他';
        if (!groups[lang]) groups[lang] = [];
        groups[lang].push(p);
      });

      const langOrder = ['AI大模型微调','Harmony','Android','HTML','Python','微信小程序','竞赛','其他'];
      const sortedLangs = Object.keys(groups).sort((a, b) => {
        const ai = langOrder.indexOf(a), bi = langOrder.indexOf(b);
        return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
      });

      let activeTab = sortedLangs[0];
      container.innerHTML = `
        <div class="project-tabs">${sortedLangs.map(l => `<button class="tab-btn${l === activeTab ? ' active' : ''}" data-tab="${l}">${l} (${groups[l].length})</button>`).join('')}</div>
        <div class="tab-content">${sortedLangs.map(l => `
          <div class="tab-panel${l === activeTab ? ' active' : ''}" data-panel="${l}">
            <div class="featured-section" id="featured-${l.replace(/\s/g,'')}">
              <h3 class="featured-title">精选</h3>
              <div id="featured-loading-${l.replace(/\s/g,'')}"><p class="empty" style="text-align:left;padding:8px 0">加载精选...</p></div>
            </div>
            <div class="all-projects-section">
              <h3 class="featured-title">全部项目 <span class="count">(${groups[l].length})</span></h3>
              <div class="project-grid">${groups[l].map(p => `
                <a href="${p.url}" class="project-card" target="_blank" rel="noopener">
                  <h3>${p.name}</h3>
                  <p>${p.description}</p>
                  <div class="project-meta">
                    ${p.language ? `<span class="lang">${p.language}</span>` : ''}
                    <span class="stars">★ ${p.stars}</span>
                  </div>
                </a>
              `).join('')}</div>
            </div>
          </div>
        `).join('')}</div>`;

      // 读取 featured/分类/项目名/ 下的图片
      async function loadFeatured(dir, lang) {
        const loadingEl = document.getElementById('featured-loading-' + lang.replace(/\s/g,''));
        try {
          // 先读 README 拿到项目名列表
          const readmeResp = await fetch('featured/' + encodeURIComponent(dir) + '/README.md');
          if (!readmeResp.ok) { loadingEl.innerHTML = '<p class="empty" style="text-align:left;padding:8px 0">暂无精选</p>'; return; }
          const text = await readmeResp.text();
          const parts = text.split('---');
          if (parts.length < 2) { loadingEl.innerHTML = '<p class="empty" style="text-align:left;padding:8px 0">暂无精选</p>'; return; }
          const names = parts[0].trim().split(',').map(s => s.trim());
          const content = parts.slice(1).join('---').trim();

          let html = '';
          for (const name of names) {
            const proj = groups[lang].find(p => p.name === name);
            if (!proj) continue;
            // 扫描该项目的截图：featured/分类/项目名/图片
            const imgDir = 'featured/' + encodeURIComponent(dir) + '/' + encodeURIComponent(name) + '/';
            const imgs = [];
            const exts = ['jpeg','jpg','png','gif','webp'];
            for (const ext of exts) {
              for (let i = 0; i <= 20; i++) {
                const fname = i === 0 ? '主界面截图.' + ext : (i + '.' + ext);
                const imgPath = imgDir + fname;
                const r = await fetch(imgPath, { method: 'HEAD' }).catch(() => {});
                if (r && r.ok) { imgs.push(imgPath); break; }
              }
            }
            const descMatch = content.match(new RegExp(name + '[:：]?\\s*(.+?)[\\n\\r]', 'i'));
            const desc = descMatch ? descMatch[1].trim() : proj.description;

            html += '<div class="featured-project">';
            html += `<h4 class="featured-project-name"><a href="${proj.url}" target="_blank" rel="noopener">${name}</a></h4>`;
            html += `<p class="featured-project-desc">${desc}</p>`;
            if (imgs.length) {
              html += '<div class="featured-screenshots">' + imgs.map(img => `<img src="${img}" alt="${name}" loading="lazy">`).join('') + '</div>';
            }
            html += '</div>';
          }

          loadingEl.innerHTML = html || '<p class="empty" style="text-align:left;padding:8px 0">暂无精选</p>';
        } catch(e) {
          loadingEl.innerHTML = '<p class="empty" style="text-align:left;padding:8px 0">暂无精选</p>';
        }
      }

      function onTabShow(lang) {
        const panel = document.querySelector(`.tab-panel[data-panel="${lang}"]`);
        if (panel && !panel.dataset.featuredLoaded) {
          panel.dataset.featuredLoaded = '1';
          const dir = {'AI大模型微调':'AI大模型微调','Harmony':'Harmony','Android':'Android','HTML':'HTML','Python':'Python','微信小程序':'微信小程序','竞赛':'竞赛','其他':'其他'}[lang];
          if (dir) loadFeatured(dir, lang);
        }
      }

      onTabShow(activeTab);

      container.addEventListener('click', e => {
        const btn = e.target.closest('.tab-btn');
        if (!btn) return;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        const panel = document.querySelector(`.tab-panel[data-panel="${btn.dataset.tab}"]`);
        if (panel) panel.classList.add('active');
        onTabShow(btn.dataset.tab);
      });
    }).catch(() => {
      document.getElementById('project-groups').innerHTML = '<p class="empty">加载失败，请刷新重试</p>';
    });
  </script>
</body>
</html>
