<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">精选项目 - 404 Blog Not Found</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo">404 Blog Not Found</a>
      <nav class="main-nav">
        <a href="index.html">首页</a>
        <a href="posts.html">归档</a>
        <a href="projects.html">作品集</a>
        <a href="about.html">关于</a>
      </nav>
      <button class="menu-toggle" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main class="container main-content">
    <article class="post-full" id="featured-content">
      <p class="empty">加载中...</p>
    </article>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; TsangHaotian | Powered by GitHub Pages</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script>
    // 从 URL 获取分类和项目名
    const params = new URLSearchParams(window.location.search);
    const category = params.get('cat');
    const project = params.get('project');

    if (!category || !project) {
      document.getElementById('featured-content').innerHTML = '<p class="empty">参数错误</p>';
    } else {
      // 读取 featured/分类/项目名/README.md
      const readmePath = `featured/${encodeURIComponent(category)}/${encodeURIComponent(project)}/README.md`;
      fetch(readmePath)
        .then(r => r.text())
        .then(text => {
          const parts = text.split('---');
          const title = parts[0].trim() || project;
          const desc = parts[1] ? parts[1].trim() : '';
          const imgNames = parts[2] ? parts[2].split('\n').map(s => s.trim()).filter(Boolean) : [];

          document.getElementById('page-title').textContent = title + ' - 404 Blog Not Found';

          let html = `<header class="post-header"><h1>${title}</h1></header>`;
          html += `<div class="post-content">`;
          if (desc) html += `<p>${desc.replace(/\n/g, '</p><p>')}</p>`;
          html += `<p><a href="https://github.com/TsangHaotian/${project}" target="_blank" rel="noopener" style="display:inline-block;padding:8px 20px;background:var(--accent);color:#fff;border-radius:8px;text-decoration:none">查看 GitHub 项目</a></p>`;
          // 截图
          if (imgNames.length) {
            html += '<h2>截图展示</h2>';
            imgNames.forEach(name => {
              const imgPath = `featured/${encodeURIComponent(category)}/${encodeURIComponent(project)}/${encodeURIComponent(name)}`;
              html += `<p><img src="${imgPath}" alt="${name}" style="max-width:100%;border-radius:10px;border:1px solid var(--border)"></p>`;
            });
          }
          html += '</div>';

          document.getElementById('featured-content').innerHTML = html;
        })
        .catch(() => {
          document.getElementById('featured-content').innerHTML = '<p class="empty">加载失败</p>';
        });
    }
  </script>
</body>
</html>
