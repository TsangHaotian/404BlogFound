<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>归档 - 404 Blog Not Found</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo">404 Blog Not Found</a>
      <nav class="main-nav">
        <a href="index.html">首页</a>
        <a href="posts.html">归档</a>
        <a href="projects.html">作品集</a>
        <a href="about.html">关于</a>
      </nav>
      <button class="menu-toggle" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main class="container main-content">
    <section class="archive">
      <h1>归档</h1>
      <div id="post-list"><p class="empty">加载中...</p></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; TsangHaotian | Powered by GitHub Pages</p>
    </div>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script>
    fetchPosts().then(posts => {
      const list = document.getElementById('post-list');
      if (!posts.length) {
        list.innerHTML = '<p class="empty">还没有文章，敬请期待。</p>';
        return;
      }
      list.innerHTML = posts.map(p => `
        <article class="post-card">
          <h3><a href="post.html?id=${p.id}">${p.title}</a></h3>
          <div class="post-meta">
            <time>${p.date}</time>
            ${p.tags.length ? `<span class="tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</span>` : ''}
          </div>
          <p class="post-excerpt">${p.description}</p>
        </article>
      `).join('');
    }).catch(() => {
      document.getElementById('post-list').innerHTML = '<p class="empty">加载失败，请刷新重试</p>';
    });
  </script>
</body>
</html>
