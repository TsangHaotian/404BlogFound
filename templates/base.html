{{define "base"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{if .Post.Title}}{{.Post.Title}} - {{end}}{{.Title}}</title>
    <meta name="description" content="{{if .Post.Description}}{{.Post.Description}}{{else}}{{.Description}}{{end}}">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <a href="/" class="logo">{{.Title}}</a>
            <nav class="main-nav">
                <a href="/">首页</a>
                <a href="/posts">归档</a>
                <a href="/projects">作品集</a>
                <a href="/about">关于</a>
            </nav>
            <button class="menu-toggle" aria-label="菜单">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <main class="container main-content">
        {{block "content" .}}{{end}}
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; {{.Author}} | Powered by Go</p>
        </div>
    </footer>

    <script src="/static/js/main.js"></script>
</body>
</html>
{{end}}
