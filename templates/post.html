{{define "content"}}
<article class="post-full">
    <header class="post-header">
        <h1>{{.Post.Title}}</h1>
        <div class="post-meta">
            <time>{{.Post.Date}}</time>
            {{if .Post.Tags}}
            <span class="tags">
                {{range .Post.Tags}}<span class="tag">{{.}}</span>{{end}}
            </span>
            {{end}}
        </div>
    </header>
    <div class="post-content">
        {{.Post.Content}}
    </div>
</article>

<div class="giscus-wrapper">
    <div class="giscus"></div>
</div>
{{end}}
