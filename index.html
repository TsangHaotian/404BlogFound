<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Blog Not Found</title>
  <meta name="description" content="TsangHaotian 的个人技术博客">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo">404 Blog Not Found</a>
      <nav class="main-nav">
        <a href="index.html">首页</a>
        <a href="posts.html">归档</a>
        <a href="projects.html">作品集</a>
        <a href="about.html">关于</a>
      </nav>
      <button class="menu-toggle" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main class="container main-content">
    <!-- 个人信息区 -->
    <section class="profile">
      <div class="profile-avatar">
        <img src="img/avatar/avatar.jpg" alt="头像">
      </div>
      <div class="profile-info">
        <h1>TsangHaotian</h1>
        <p class="profile-bio">记录学习与思考 / 热爱技术 / 持续成长</p>
        <div class="profile-contact">
          <span class="contact-item">📧 TsangHaotian@hotmail.com</span>
          <span class="contact-item"><svg viewBox="0 0 16 16" width="18" height="18" fill="currentColor" style="vertical-align:-4px;display:inline-block"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg> <a href="https://github.com/TsangHaotian" target="_blank">TsangHaotian</a></span>
        </div>
      </div>
    </section>

    <!-- 最新文章 -->
    <section class="recent-posts section-card">
      <h2>📝 最新文章</h2>
      <div id="post-list"><p class="empty">加载中...</p></div>
    </section>

    <!-- GitHub 项目 -->
    <section class="github-projects section-card">
      <h2>⭐ GitHub 项目</h2>
      <div id="project-grid" class="project-grid"><p class="empty">加载中...</p></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; TsangHaotian | Powered by GitHub Pages</p>
    </div>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script>
    fetchPosts().then(posts => {
      const list = document.getElementById('post-list');
      if (!posts.length) {
        list.innerHTML = '<p class="empty">还没有文章，敬请期待。</p>';
        return;
      }
      list.innerHTML = posts.slice(0, 5).map(p => `
        <article class="post-card">
          <h3><a href="post.html?id=${p.id}">${p.title}</a></h3>
          <div class="post-meta">
            <time>${p.date}</time>
            ${p.tags.length ? `<span class="tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</span>` : ''}
          </div>
          <p class="post-excerpt">${p.description}</p>
        </article>
      `).join('');
    }).catch(() => {
      document.getElementById('post-list').innerHTML = '<p class="empty">加载失败，请刷新重试</p>';
    });

    fetchRepos().then(projects => {
      const langMap = {'404BlogFound':'HTML','CardGameYS':'其他','CardGame_Android':'Android','Harmony_CardGame':'Harmony','Harmony_EyesNote':'Harmony','GaokaoHelper':'HTML','openclaw-css-tweaker':'Python','JRXY-AutoSign-Reborn':'Python','Software_Libraries':'其他','RocoKingdomTranslator':'HTML','Python_Visual_Focus_Training_System':'Python','DrawAnythingToYakiji':'HTML','YajijiOracle':'HTML','4C_competition':'竞赛','web_happybirthday':'HTML','Android_login':'Android','python_word_to_excel':'Python','python_Job_Check_tool':'Python','python_pdf_to_word':'Python','Android_login_and_jigsaw_puzzle':'Android','Android_Calculators':'Android','python_Excel_merge_tool':'Python','Android_Mental_health_program':'Android','Python_Probability_theory_gambling_game':'Python','Python_Interactive_somatosensory_operation':'Python','Su-Shi-dingfengbo-poems-fine-tuning-AI-model':'AI大模型微调','python_ppt_assistant':'Python','Python_data_merge_tool':'Python','Python_Probability_theory_gambling_game_V2.0':'Python','python_40_Parallel_College_Volunteering_for_C':'Python','Web_Truth_or_dare':'HTML','Web_Find_a_difference':'HTML','Web_Person':'HTML','Web_Xinjiang_Foods':'HTML','Python_mind_project':'Python','WChatXiaochengxuYun_jizhangben':'微信小程序','WChatXiaoChengxu_jizhangben':'微信小程序','Organizing_the_computer_desktop':'Python','python_web_Question_Bank_Assistant':'Python','Python_hand_language_web':'Python'};
      projects.forEach(p => { p.language = langMap[p.name] || p.language || '其他'; });
      const grid = document.getElementById('project-grid');
      if (!projects.length) {
        grid.innerHTML = '<p class="empty">暂无 GitHub 项目展示。</p>';
        return;
      }
      grid.innerHTML = projects.slice(0, 6).map(p => `
        <a href="${p.url}" class="project-card" target="_blank" rel="noopener">
          <h3>${p.name}</h3>
          <p>${p.description}</p>
          <div class="project-meta">
            ${p.language ? `<span class="lang">${p.language}</span>` : ''}
            <span class="stars">★ ${p.stars}</span>
          </div>
        </a>
      `).join('');
    }).catch(() => {
      document.getElementById('project-grid').innerHTML = '<p class="empty">加载失败</p>';
    });
  </script>
</body>
</html>
