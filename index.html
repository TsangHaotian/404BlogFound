<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Blog Not Found</title>
  <meta name="description" content="TsangHaotian 的个人技术博客">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo">404 Blog Not Found</a>
      <nav class="main-nav">
        <a href="index.html">首页</a>
        <a href="posts.html">归档</a>
        <a href="projects.html">作品集</a>
        <a href="about.html">关于</a>
      </nav>
      <button class="menu-toggle" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main class="container main-content">
    <!-- 个人信息区 -->
    <section class="profile">
      <div class="profile-avatar">
        <img src="img/avatar/avatar.jpg" alt="头像">
      </div>
      <div class="profile-info">
        <h1>TsangHaotian</h1>
        <p class="profile-bio">记录学习与思考 / 热爱技术 / 持续成长</p>
        <div class="profile-contact">
          <span class="contact-item">📧 TsangHaotian@hotmail.com</span>
          <span class="contact-item">🐙 <a href="https://github.com/TsangHaotian" target="_blank">TsangHaotian</a></span>
        </div>
      </div>
    </section>

    <!-- 最新文章 -->
    <section class="recent-posts section-card">
      <h2>📝 最新文章</h2>
      <div id="post-list"><p class="empty">加载中...</p></div>
    </section>

    <!-- GitHub 项目 -->
    <section class="github-projects section-card">
      <h2>⭐ GitHub 项目</h2>
      <div id="project-grid" class="project-grid"><p class="empty">加载中...</p></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; TsangHaotian | Powered by GitHub Pages</p>
    </div>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script>
    fetchPosts().then(posts => {
      const list = document.getElementById('post-list');
      if (!posts.length) {
        list.innerHTML = '<p class="empty">还没有文章，敬请期待。</p>';
        return;
      }
      list.innerHTML = posts.slice(0, 5).map(p => `
        <article class="post-card">
          <h3><a href="post.html?id=${p.id}">${p.title}</a></h3>
          <div class="post-meta">
            <time>${p.date}</time>
            ${p.tags.length ? `<span class="tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</span>` : ''}
          </div>
          <p class="post-excerpt">${p.description}</p>
        </article>
      `).join('');
    }).catch(() => {
      document.getElementById('post-list').innerHTML = '<p class="empty">加载失败，请刷新重试</p>';
    });

    fetchRepos().then(projects => {
      function detectLang(name) {
        const n = name.toLowerCase();
        if (n.includes('harmony')) return 'Harmony';
        if (n.includes('android')) return 'Android';
        if (n.includes('python')) return 'Python';
        if (n.includes('web') || n.includes('html')) return 'Web';
        if (n.includes('java')) return 'Java';
        return null;
      }
      projects.forEach(p => { p.language = detectLang(p.name) || p.language || '其他'; });
      const grid = document.getElementById('project-grid');
      if (!projects.length) {
        grid.innerHTML = '<p class="empty">暂无 GitHub 项目展示。</p>';
        return;
      }
      grid.innerHTML = projects.slice(0, 3).map(p => `
        <a href="${p.url}" class="project-card" target="_blank" rel="noopener">
          <h3>${p.name}</h3>
          <p>${p.description}</p>
          <div class="project-meta">
            ${p.language ? `<span class="lang">${p.language}</span>` : ''}
            <span class="stars">★ ${p.stars}</span>
          </div>
        </a>
      `).join('');
    }).catch(() => {
      document.getElementById('project-grid').innerHTML = '<p class="empty">加载失败</p>';
    });
  </script>
</body>
</html>
